services:
  # ─── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inspecto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspecto}
      POSTGRES_DB: ${POSTGRES_DB:-inspecto}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspecto} -d ${POSTGRES_DB:-inspecto}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── S3-compatible Storage ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/${S3_BUCKET:-inspecto-files} --ignore-existing;
      exit 0;
      "

  # ─── API Server ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: inspecto-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inspecto}:${POSTGRES_PASSWORD:-inspecto}@postgres:5432/${POSTGRES_DB:-inspecto}
      S3_ENDPOINT: http://minio:9000
    ports:
      - "127.0.0.1:${API_PORT:-3010}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Web Client ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://inspecto.solrum.dev/api}
    container_name: inspecto-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${WEB_PORT:-3011}:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:

# ─── Deployment ──────────────────────────────────────────────────────────
#
# Inspecto runs its own DB, storage, API and web — no nginx included.
# The host's existing nginx (e.g. KSS) routes inspecto.solrum.dev
# to these containers via localhost ports.
#
# 1. Deploy Inspecto:
#      docker compose up -d --build
#
# 2. Add inspecto config to host nginx (KSS stack):
#      Copy deploy/nginx/inspecto.solrum.dev.conf into KSS nginx config
#      Rebuild KSS nginx: docker compose -f kss/docker-compose.yml build nginx
#
# 3. DNS: inspecto.solrum.dev → same server IP (Cloudflare proxy ON)
#
# Default ports: API=3010, Web=3011 (avoid conflict with KSS 3001-3009)
# Override via API_PORT / WEB_PORT in .env
