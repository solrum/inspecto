# ============================================================
# Inspecto — Production Docker Compose
# ============================================================
# Pulls pre-built images from GHCR. Watchtower auto-updates.
# Server setup: scripts/setup-server.sh
# ============================================================

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inspecto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inspecto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inspecto}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspecto} -d ${POSTGRES_DB:-inspecto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging
    networks:
      - inspecto

  # ─── S3-compatible Storage ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: inspecto-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging
    networks:
      - inspecto

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/${S3_BUCKET:-inspecto-files} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    networks:
      - inspecto

  # ─── API Server ────────────────────────────────────────────────────────
  api:
    image: ghcr.io/solrum/inspecto-api:${IMAGE_TAG:-latest}
    container_name: inspecto-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inspecto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inspecto}
      S3_ENDPOINT: http://minio:9000
    ports:
      - "127.0.0.1:${API_PORT:-3010}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *logging
    networks:
      - inspecto

  # ─── Web Client ────────────────────────────────────────────────────────
  web:
    image: ghcr.io/solrum/inspecto-web:${IMAGE_TAG:-latest}
    container_name: inspecto-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${WEB_PORT:-3011}:3000"
    depends_on:
      - api
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *logging
    networks:
      - inspecto

  # ─── Auto-Update: Watchtower ───────────────────────────────────────────
  # Polls GHCR every 60s, auto-pulls & restarts labeled containers
  # ─────────────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: inspecto-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 60
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    logging: *logging
    command: --interval 60 --label-enable
    networks:
      - inspecto

volumes:
  pgdata:
  miniodata:

networks:
  inspecto:
    name: inspecto
